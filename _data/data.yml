experiences:
  title: Experiences
  info:
    - role: Middle Software Engineer
      time: Oct 2021 - Mar 2026
      company: EPAM
      details: |
        Worked on several EPAM projects focused on Sitecore platforms, integrations, feature delivery, and rollout support for enterprise clients.

        Representative work:
        - **VUEE-ITL** (Sep 2024 - Jan 2025): supported Vue Italy feature development, rollout, and code review activities.
        - **VUEE-MLTK** (Mar 2024 - Sep 2024): implemented and rolled out Poland territory features on an existing Sitecore 10 platform.
        - **VUEE-CSRV** (Oct 2023 - Nov 2023): built a SOAP client and Vista parser, fixed defects, and added microservice logging for customer self-service modules.
        - **EPMC-STC** (Jul 2023 - Oct 2023): contributed to Sitecore Competency Center work and removed GraphQL from selected components.
        - **HOWD-SITE** (Feb 2022 - Jun 2023): delivered Sitecore web enhancements and updated Sitecore PowerShell scripts.

        Additional responsibilities:
        - Participated in code review, estimation, prioritization, debugging, and delivery activities
        - Built backend features and integrations for Sitecore-based solutions
        - Supported maintenance, rollout tasks, and implementation work across projects

        Tools and technologies: Sitecore, Content Hub, C#, .NET, ASP.NET MVC, ASP.NET Web API, Entity Framework, GraphQL, SOAP, Redis, Microsoft SQL Server, MongoDB, Sitecore PowerShell, Postman, Jira, JetBrains Rider, Git
    - role: System Administrator
      time: 2019 - 2019
      company: Krivorozhgaz
      details: |
        Created 2 internal sites:
        - Phone book
        - Website for managing car requests

        Developed communication between site and Active Directory using AJAX.
        Performed integration with Active Directory over HTTPS.
    - role: Software Engineer
      time: 2018 - 2018
      company: PRIVATE ORGANIZATION
      details: |
        Worked on an Android application for management and repair of washing machines with Arcadia and Evo controllers.
        Developed the application from scratch:
        - implemented read and write operations for target controllers;
        - implemented controller error checks;
        - implemented manual control for machine parts to test them one by one;
        - implemented custom authorization and authentication;
        - added localization for multiple languages (RU, EN, FR, IT).
    - role: Software Engineer
      time: 2017 - 2018
      company:
      details: |
        Worked as a freelance software engineer on different projects.
        Was responsible for code development and product support.

