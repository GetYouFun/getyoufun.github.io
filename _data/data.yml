career-profile:
  title: Summary
  summary: |
    Middle Software Engineer with strong .NET and Sitecore experience, focused on enterprise CMS platforms, integrations, feature delivery, rollout support, and production-facing improvements.

    Core strengths:
    - Sitecore platform development and support
    - .NET backend development and integrations
    - Feature delivery, rollout work, and production support
    - Clean code, SOLID principles, and collaborative engineering practices
    - Azure fundamentals, automation, and continuous learning

skills:
  title: Skills
  summary: |
    - **Core:** C#, .NET, ASP.NET MVC, ASP.NET Web API, Entity Framework
    - **Sitecore:** Sitecore CMS, XM/XP, Content Hub, Experience Editor, Content Editor, Sitecore PowerShell, Sitecore Helix, Sitecore Serialization
    - **Data & Integration:** MSSQL, MongoDB, GraphQL, SOAP, REST APIs, Redis
    - **Ways of Working:** SOLID, code review, debugging, rollout support, estimation and prioritization
    - **Other:** Azure Fundamentals, Git, Postman, Jira, JetBrains Rider, Python scripting and automation

